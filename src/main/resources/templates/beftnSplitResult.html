<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>Data Converter</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>

<body>

  <div class="upload-container">
    <div class="upload-header">
      <h2 style="text-align: center">BEFTN File Splitter Result</h2>
    </div>
    <div class="upload-content">
      <h4 th:text="${message}"></h4>
      <div th:if="${individualSum}">
        <strong>
          <p>Individual Sum:</p>
        </strong>
        <span th:text="'('"></span>
        <span th:each="item, iterStat : ${individualSum}">
          <span th:text="${item}"></span>
          <span th:if="${!iterStat.last}" th:text="' + '"></span>
        </span>
        <span th:text="')'"></span>
      </div>
      <div th:if="${grossSum}">
        <strong>
          <p>Gross Sum: </p>
        </strong>
        <span th:text="${grossSum[0]}"></span>
      </div>
      <div th:if="${totalCount}">
        <strong>
          <p>Total Number of Remittances:</p>
        </strong>
        <span th:text="${totalCount[0]}"></span>
      </div>
      <div th:if="${fileNames}">
        <hr style="border: 1px solid #ececec; margin: 20px 0;">
        <div style="margin-bottom: 20px; text-align: center;">
          <a th:href="@{/beftn/downloadAll}" class="button-24" style="text-decoration: none;">Download All as ZIP</a>
        </div>
        <h5>Download Individual Files:</h5>
        <ul style="list-style-type: none; padding-left: 0;">
          <li th:each="fileName : ${fileNames}"
            style="padding: 8px 12px; background: #f9f9f9; border: 1px solid #eee; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
            <span th:text="${fileName}" style="font-weight: 500; color: #555;"></span>
            <a th:href="@{'/beftn/downloadSplit/' + ${fileName}}" class="button-12"
              style="text-decoration: none; padding: 4px 12px; font-size: 0.9rem;">Download</a>
          </li>
        </ul>
      </div>
      <br><br>
      <div class="single-upload">
        <center><a href="/" class="btn btn-primary">Go Back</a></center>
      </div>
    </div>
  </div>
  </br>
</body>

</html>
