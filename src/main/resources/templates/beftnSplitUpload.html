<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>BEFTN File Splitter</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
     .spinner {
       border: 8px solid #f3f3f3;
       border-top: 8px solid #3498db;
       border-radius: 50%;
       width: 60px;
       height: 60px;
       animation: spin 1s linear infinite;
     }
     @keyframes spin {
       0% { transform: rotate(0deg); }
       100% { transform: rotate(360deg); }
     }
   </style>
</head>
<body>
<div id="loader" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);z-index:1000;justify-content:center;align-items:center;">
  <div class="spinner" style="border:8px solid #f3f3f3;border-top:8px solid #3498db;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;"></div>
</div>
<div class="upload-container">
  <div class="upload-header">
    <h2 style="text-align: center">BEFTN Excel File Splitter</h2>
  </div>
  <div class="upload-content">
    <div class="single-upload">
      <form action="/beftn/split" method="post" enctype="multipart/form-data">
        <div class="row">
          <br>
            <label for="file">Choose BEFTN File:</label>
            <input type="file" id="file" name="file" accept=".xlsx" required>
            <br><br>
            <label for="maxRows">Max Number of Rows Per File: </label>
            <input type="number" id="maxRows" name="maxRows" value="1000" required>
            <br><br>
            <label for="initialFileNumber">Initial File Number:</label>
            <input type="number" id="initialFileNumber" name="initialFileNumber" value="1" required>
          <br><br>
        </div>
        <center><button type="submit" class="button-24">Split</button></center>
      </form>
    </div>
  </div>
</div>
</div>
</div>
</div>
<script>
  document.querySelector('form').addEventListener('submit', function(){
    document.getElementById('loader').style.display='flex';
  });
</script>
</body>
</html>
